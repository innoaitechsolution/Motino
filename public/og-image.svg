<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Motino  spin once a day for a motivational quote">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8f5f0"/>
      <stop offset="50%" stop-color="#ede9fe"/>
      <stop offset="100%" stop-color="#ffedd5"/>
    </linearGradient>
    <linearGradient id="wheel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <g transform="translate(900 315)">
    <circle r="140" fill="url(#wheel)"/>
    <circle r="52" fill="#fff" opacity="0.95"/>
    <circle cy="-118" r="14" fill="#1e293b"/>
  </g>
  <text x="72" y="220" font-family="system-ui, Segoe UI, sans-serif" font-size="72" font-weight="700" fill="#1e293b">Motino</text>
  <text x="72" y="300" font-family="system-ui, Segoe UI, sans-serif" font-size="32" font-weight="500" fill="#64748b">Spin the wheel once a day</text>
  <text x="72" y="350" font-family="system-ui, Segoe UI, sans-serif" font-size="32" font-weight="500" fill="#64748b">Get your motivational quote</text>
</svg>
